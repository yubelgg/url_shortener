services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER:-admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-hackathon_db}
    ports:
      - "5432:5432"
    networks:
      - hackathon-network

  app:
    build: .
    restart: always
    ports:
      - "5001:8080"
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-hackathon_db}
      DATABASE_USER: ${DATABASE_USER:-admin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    networks:
      - hackathon-network

networks:
  hackathon-network:
    driver: bridge